services:

  # ==========================================
  #    CORE CORE INFRASTRUCTURE DATA LAYER
  # ==========================================
  db:
    image: postgres:latest
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: kotaro
      POSTGRES_PASSWORD: kotaro1106
      POSTGRES_DB: ai_image_editor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs_local
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: ${AWS_ACCESS_KEY_ID}
      RUSTFS_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - ./rustfs_data:/data
  redis:
    image: redis:8
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ==========================================
  #    API GATEWAY
  # ==========================================
  api:
    build: ./api_gateway
    container_name: api_gateway
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      PYTHONPATH: /workspace
    volumes:
      - ./api_gateway:/workspace
      - ./shared:/workspace/shared:ro

  # ==========================================
  #   BACKGROUND PROCESSING GRID
  # ==========================================
  worker_base:
    build: ./processing_worker
    image: photo_processor_base:latest
    command: ["echo", "Base image built successfully"]
  grayscale_worker:
    build: ./processing_worker
    container_name: pillow_worker
    env_file:
      - .env
    environment:
      PYTHONPATH: /workspace
    volumes:
      - ./processing_worker:/workspace
      - ./shared:/workspace/shared:ro
    command: celery -A app.tasks.celery_app worker -Q default_ops --loglevel=info
    depends_on:
      - worker_base
      - redis
      - db
  rembg_worker:
    build: ./processing_worker
    container_name: rembg_worker
    env_file:
      - .env
    environment:
      PYTHONPATH: /workspace
    volumes:
      - ./processing_worker:/workspace
      - ./shared:/workspace/shared:ro
    command: celery -A app.tasks.celery_app worker -Q heavy_ai --loglevel=info
    depends_on:
      - worker_base
      - redis
      - db

volumes:
  postgres_data:
