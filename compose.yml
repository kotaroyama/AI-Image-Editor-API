services:
  api:
    build: ./api_gateway
    container_name: api_gateway
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RUSTFS_ENDPOINT: ${RUSTFS_ENDPOINT}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  worker:
    build: ./processing_worker
    container_name: photo_processor_worker
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RUSTFS_ENDPOINT: ${RUSTFS_ENDPOINT}
      REDIS_URL: ${REDIS_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - ./processing_worker:/workspace
    depends_on:
      - redis
      - db
  db:
    image: postgres:latest
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: kotaro
      POSTGRES_PASSWORD: kotaro1106
      POSTGRES_DB: ai_image_editor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs_local
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: ${AWS_ACCESS_KEY_ID}
      RUSTFS_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - ./rustfs_data:/data
  redis:
    image: redis:8
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
volumes:
  postgres_data: